name: MARG Engine

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: 

jobs:
  run_engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MARG Repository
        uses: actions/checkout@v4

      - name: Checkout TGCA Repository
        uses: actions/checkout@v4
        with:
          repository: 'ravikiranoffl/TGCA' # Pulls your markdown files
          path: 'TGCA' 

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Master Engine (Telemetry & Indexer)
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: python marg.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "ravikiranoffl"
          git config --global user.email "171322216+ravikiranoffl@users.noreply.github.com"
          
          # Safeguard: Create files if they don't exist yet to prevent Git errors
          touch history.csv login.csv index.json
          mkdir -p data
          
          # Stage EVERYTHING (Telemetry CSVs + Search Index JSONs)
          git add history.csv login.csv index.json data/
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ='Asia/Kolkata' date +'%Y%m%d%H%M%S')
            git commit -m "MARG-${TIMESTAMP}"
            git push
          else
            echo "No new data to commit."
          fi
