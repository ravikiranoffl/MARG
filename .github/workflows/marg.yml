name: VANI Index

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  build_index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MARG Repository
        uses: actions/checkout@v4
        
      - name: Checkout TGCA Repository
        uses: actions/checkout@v4
        with:
          repository: 'ravikiranoffl/TGCA'
          path: 'TGCA'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Index JSON
        run: python scripts/marg.py

      - name: Commit and Push Index
        run: |
          git config --global user.name "ravikiranoffl"
          git config --global user.email "171322216+ravikiranoffl@users.noreply.github.com"
          git add index.json
          
          # Only proceed to commit if there are explicit modifications to index.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            TIMESTAMP=$(TZ='Asia/Kolkata' date +'%Y%m%d%H%M%S')
            git commit -m "MARG-${TIMESTAMP}"
            git push
          else
            echo "No changes found in index.json. Skipping commit."
          fi
